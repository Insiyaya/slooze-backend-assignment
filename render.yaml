services:
  - type: web
    name: slooze-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run build && npx prisma db push && npm run seed && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://slooze-app.onrender.com

  - type: web
    name: slooze-app
    env: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://slooze-api.onrender.com/graphql
